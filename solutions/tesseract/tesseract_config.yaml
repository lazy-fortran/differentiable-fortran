name: "differentiable-fortran-enzyme"
version: "0.1.0"
description: |
  One heat-equation step compiled from Fortran with LFortran and differentiated
  with Enzyme. Exposes primal, JVP, and VJP endpoints under the repository's
  common contract.

build_config:
  base_image: "debian:bookworm-slim"
  target_platform: "linux/amd64"
  extra_packages:
    - wget
    - gnupg
    - ca-certificates
    - bzip2
  package_data:
    - ["../../toolchains/enzyme/heat_step_kernel.f90", "enzyme/heat_step_kernel.f90"]
    - ["../../toolchains/enzyme/enzyme_wrapper.c", "enzyme/enzyme_wrapper.c"]
    - ["build_enzyme.sh", "enzyme/build_enzyme.sh"]
  custom_build_steps:
    - |
      RUN wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | gpg --dearmor -o /etc/apt/keyrings/llvm.gpg && \
          echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/bookworm/ llvm-toolchain-bookworm-19 main" \
          > /etc/apt/sources.list.d/llvm.list && \
          apt-get update && \
          apt-get install -y --no-install-recommends llvm-19 clang-19 && \
          rm -rf /var/lib/apt/lists/* && \
          for tool in opt llvm-link clang; do \
              ln -sf /usr/bin/${tool}-19 /usr/local/bin/${tool}; \
          done
    - |
      RUN wget -q https://github.com/mamba-org/micromamba-releases/releases/latest/download/micromamba-linux-64 \
          -O /usr/local/bin/micromamba && \
          chmod +x /usr/local/bin/micromamba && \
          MAMBA_ROOT_PREFIX=/opt/conda micromamba create -y -n base \
              -c conda-forge lfortran=0.61.0 && \
          ln -sf $(find /opt/conda -name lfortran -type f | head -1) \
              /usr/local/bin/lfortran && \
          echo /opt/conda/lib > /etc/ld.so.conf.d/conda.conf && \
          ldconfig
    - |
      RUN wget -q https://github.com/EnzymeAD/Enzyme/releases/download/nightly/LLVMEnzyme-19.so \
          -O /usr/local/lib/LLVMEnzyme-19.so
    - |
      RUN chmod +x /tesseract/enzyme/build_enzyme.sh && \
          /tesseract/enzyme/build_enzyme.sh
